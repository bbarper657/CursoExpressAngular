<div class="students-container">
    <h2>Alumnos</h2>
    <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
            <td mat-cell *matCellDef="let student"> {{ student.id }} </td>
        </ng-container>

        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> NOMBRE </th>
            <td mat-cell *matCellDef="let student"> {{ student.name }} </td>
        </ng-container>
        
        <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> EMAIL </th>
            <td mat-cell *matCellDef="let student"> {{ student.email }} </td>
        </ng-container>
        
        <ng-container matColumnDef="phone">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> TELÉFONO </th>
            <td mat-cell *matCellDef="let student"> {{ student.phone }} </td>
        </ng-container>

        <ng-container matColumnDef="image">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> IMAGEN </th>
            <td mat-cell *matCellDef="let student"> {{ student.image }} </td>
        </ng-container>

        <!-- Definición de la fila de encabezado -->
        <thead>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        </thead>

        <!-- Definición de las filas de datos -->
        <tbody>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </tbody>
    </table>

    <!-- Paginador de Angular Material -->
    <mat-paginator
        [length]="totalElements"
        [pageSize]="pageSize"
        [pageSizeOptions]="[3, 5, 10]"
        (page)="handlePageEvent($event)"
        showFirstLastButtons>
    </mat-paginator>

    <!-- Mensaje de error en caso de que ocurra un problema al cargar los datos -->
    <p *ngIf="error" class="error-message">{{ error }}</p>
</div>
